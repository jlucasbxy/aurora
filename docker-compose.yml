services:
  lumi-db:
    image: postgres:18-alpine
    restart: no
    environment:
      POSTGRES_USER: lumi
      POSTGRES_PASSWORD: lumi
      POSTGRES_DB: lumi_db
    ports:
      - "5432:5432"
    volumes:
      - lumi_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: no
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

volumes:
  lumi_data:
