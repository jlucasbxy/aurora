services:
  aurora-db:
    image: postgres:18-alpine
    restart: no
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora
      POSTGRES_DB: aurora_db
    ports:
      - "5432:5432"
    volumes:
      - aurora_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: no
    command: redis-server --requirepass aurora_cache
    ports:
      - "6379:6379"

volumes:
  aurora_data:
