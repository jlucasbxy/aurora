services:
  movies-db:
    image: postgres:18-alpine
    restart: no
    environment:
      POSTGRES_USER: movies
      POSTGRES_PASSWORD: movies
      POSTGRES_DB: movies_db
    ports:
      - "5432:5432"
    volumes:
      - movies_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: no
    ports:
      - "6379:6379"

volumes:
  movies_data:
